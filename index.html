        text-align: center;

        letter-spacing: -0.02em;
        background: linear-gradient(135deg, #40937a, #4da686);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        position: relative;
      }
      
      h1::after {
        content: '';
        position: absolute;
        bottom: -8px;
        left: 50%;
        transform: translateX(-50%);
        width: 60px;
        height: 3px;
        background: linear-gradient(45deg, #dc5e40, #ff7f50);
        border-radius: 2px;
      }

        position: relative;

        align-items: center;
        justify-content: center;

        padding: 32px;

        font-size: 1.6em;
        font-weight: 500;
        color: #2d3748;
        line-height: 1.4;
        opacity: 0;
        transform: translateY(15px) scale(0.98);
        transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        max-width: 100%;
      }
      
      .question.show {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      
      .button-container {
        margin-top: 40px;
      }
      
      button {
        background: linear-gradient(135deg, #dc5e40, #ff7f50);
        color: #fff;
        border: none;
        border-radius: 50px;
        padding: 16px 32px;
        font-size: 1.1em;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 
          0 8px 25px rgba(220, 94, 64, 0.3),
          0 4px 15px rgba(0, 0, 0, 0.1);
        position: relative;
        overflow: hidden;
        text-transform: none;
        letter-spacing: 0.5px;
        min-width: 160px;
      }
      
      button::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
        transition: left 0.5s;
      }
      
      button:hover {
        transform: translateY(-2px) scale(1.02);
        box-shadow: 
          0 12px 35px rgba(220, 94, 64, 0.4),
          0 6px 20px rgba(0, 0, 0, 0.15);
      }
      
      button:hover::before {
        left: 100%;
      }
      
      button:active {
        transform: translateY(0) scale(0.98);
        transition: all 0.1s;
      }

        body {
          padding: 16px;
        }

          padding: 32px 24px;

        }

        }

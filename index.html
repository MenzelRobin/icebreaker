<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Icebreaker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-primary: #0f0f0f;
        --bg-secondary: #1a1a1a;
        --bg-card: #141414;
        --text-primary: #fafafa;
        --text-secondary: #a1a1a1;
        --accent: #6366f1;
        --accent-light: #818cf8;
        --accent-glow: rgba(99, 102, 241, 0.4);
        --border: rgba(255, 255, 255, 0.08);
        --border-hover: rgba(255, 255, 255, 0.15);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        font-size: 16px;
      }

      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        position: relative;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: radial-gradient(
            ellipse 80% 50% at 50% -20%,
            rgba(99, 102, 241, 0.15),
            transparent
          ),
          radial-gradient(
            ellipse 60% 40% at 100% 100%,
            rgba(139, 92, 246, 0.1),
            transparent
          );
        pointer-events: none;
      }

      .app {
        width: 100%;
        max-width: 640px;
        display: flex;
        flex-direction: column;
        gap: 32px;
        position: relative;
        z-index: 1;
      }

      header {
        text-align: center;
      }

      .logo {
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--accent-light);
        margin-bottom: 8px;
      }

      h1 {
        font-size: 2.5rem;
        font-weight: 700;
        letter-spacing: -0.03em;
        line-height: 1.1;
        background: linear-gradient(
          to bottom right,
          var(--text-primary) 30%,
          var(--text-secondary)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 48px 40px;
        position: relative;
        overflow: hidden;
        transition: border-color 0.3s ease, box-shadow 0.3s ease;
      }

      .card:hover {
        border-color: var(--border-hover);
        box-shadow: 0 0 60px -12px var(--accent-glow);
      }

      .card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.1),
          transparent
        );
      }

      .question-wrapper {
        min-height: 140px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .question {
        font-size: 1.5rem;
        font-weight: 500;
        line-height: 1.5;
        text-align: center;
        color: var(--text-primary);
        opacity: 0;
        transform: translateY(12px);
        transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1),
          transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .question.visible {
        opacity: 1;
        transform: translateY(0);
      }

      .actions {
        display: flex;
        justify-content: center;
        padding-top: 8px;
      }

      button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        background: var(--accent);
        color: white;
        border: none;
        border-radius: 100px;
        padding: 16px 32px;
        font-family: inherit;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        position: relative;
        overflow: hidden;
      }

      button::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.15),
          transparent
        );
        opacity: 0;
        transition: opacity 0.2s ease;
      }

      button:hover {
        background: var(--accent-light);
        transform: translateY(-2px);
        box-shadow: 0 8px 32px -8px var(--accent-glow);
      }

      button:hover::before {
        opacity: 1;
      }

      button:active {
        transform: translateY(0) scale(0.98);
      }

      button svg {
        width: 20px;
        height: 20px;
        transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      }

      button:hover svg {
        transform: rotate(180deg);
      }

      .counter {
        text-align: center;
        font-size: 0.875rem;
        color: var(--text-secondary);
        font-variant-numeric: tabular-nums;
      }

      .keyboard-hint {
        display: flex;
        justify-content: center;
        gap: 6px;
        color: var(--text-secondary);
        font-size: 0.8125rem;
      }

      kbd {
        background: var(--bg-secondary);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 4px 10px;
        font-family: inherit;
        font-size: 0.75rem;
      }

      @media (max-width: 640px) {
        body {
          padding: 20px;
        }

        h1 {
          font-size: 2rem;
        }

        .card {
          padding: 36px 24px;
          border-radius: 20px;
        }

        .question-wrapper {
          min-height: 120px;
        }

        .question {
          font-size: 1.25rem;
        }

        button {
          padding: 14px 28px;
          font-size: 0.9375rem;
        }

        .keyboard-hint {
          display: none;
        }
      }

      @media (max-width: 380px) {
        .card {
          padding: 28px 20px;
        }

        .question {
          font-size: 1.125rem;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          transition-duration: 0.01ms !important;
          animation-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <div class="logo">Icebreaker</div>
        <h1>Gesprächsstarter</h1>
      </header>

      <main class="card">
        <div class="question-wrapper">
          <p class="question" id="question"></p>
        </div>
        <div class="actions">
          <button onclick="nextQuestion()" id="nextBtn">
            <span>Nächste Frage</span>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8" />
              <path d="M21 3v5h-5" />
            </svg>
          </button>
        </div>
      </main>

      <footer>
        <p class="counter">
          <span id="current">1</span> von <span id="total">0</span> Fragen
        </p>
        <div class="keyboard-hint">
          <kbd>Leertaste</kbd>
          <span>für nächste Frage</span>
        </div>
      </footer>
    </div>

    <script>
      const questions = [
        // Tiefgründige Selbstreflexion
        "Gibt es etwas, von dem du schon lange träumst es zu tun? Was hält dich bisher davon ab?",
        "Was war das Hilfreichste, das du in letzter Zeit gelernt hast?",
        "Wofür gibst du gerne Geld aus und schaust auch nicht zwingend auf das Preisschild?",
        "Was tust du regelmäßig und immer wieder, obwohl es dir absolut nicht gefällt?",
        "Was ist das Beste daran, du zu sein?",
        "Was tust du, um dich selbst glücklich zu machen?",
        "Du wirst nach deinem Ableben einmalig wiedergeboren und kannst komplett frei bestimmen als was. Wofür entscheidest du dich?",
        "Wo möchtest du im Leben stehen, wenn du deinen nächsten runden Geburtstag erreichst?",
        "Du kannst einen Tag in deinem Leben nochmal leben. Welchen Tag wählst du aus?",
        "Woran merkst du, dass du dich bei jemandem wirklich wohlfühlst?",
        "Welche kleine Sache macht deinen Alltag sofort besser?",
        "Was ist eine Meinung, die du früher hattest, aber inzwischen komplett geändert hast?",
        "Welche Fähigkeit würdest du gerne haben, wenn du sie morgen einfach 'downloaden' könntest?",
        "Welche drei Dinge würdest du auf eine einsame Insel mitnehmen (ohne Handy/Internet)?",
        "Was war dein letzter Moment, in dem du richtig stolz auf dich warst?",
        "Welche Gewohnheit würdest du gerne loswerden – und warum?",
        "Was ist etwas, das dich gerade neugierig macht?",
        "Welche Entscheidung hat dein Leben stärker beeinflusst, als du damals gedacht hast?",
        "Wenn du ein Jahr lang ein Projekt verfolgen müsstest: Was würdest du bauen, lernen oder erschaffen?",
        "Was ist dein persönlicher Comfort-Film oder Comfort-Serie und warum?",
        "Welche Person (real oder fiktiv) würdest du gerne mal einen Abend lang ausfragen?",
        "Welche Sache hast du dieses Jahr zum ersten Mal gemacht?",
        "Was ist ein Kompliment, an das du dich bis heute erinnerst?",
        "Was ist etwas, das du dir als Kind für Erwachsene anders vorgestellt hast?",
        "Welche Aktivität bringt dich am schnellsten in einen Flow?",
        "Worüber könntest du 20 Minuten reden, ohne dich vorbereiten zu müssen?",
        "Wenn du morgen frei hättest und müsstest nichts erledigen: Wie sieht dein Tag aus?",
        "Was ist ein Satz, der dich in schwierigen Momenten erdet?",
        "Welche kleine 'unvernünftige' Sache würdest du sofort machen, wenn Geld keine Rolle spielt?",

        // Persönlichkeit & Werte
        "Was bedeutet für dich ein erfülltes Leben?",
        "Welche Eigenschaft an dir magst du am meisten?",
        "Was würdest du tun, wenn du wüsstest, dass du nicht scheitern kannst?",
        "Welchen Wert hast du von deinen Eltern übernommen, der dir wichtig ist?",
        "Was ist etwas, das du niemals ändern würdest an dir?",
        "Wann hast du zuletzt etwas Neues über dich selbst gelernt?",
        "Welche Lebensweisheit gibst du gerne weiter?",
        "Was macht dich einzigartig?",
        "Wofür bist du in deinem Leben am dankbarsten?",
        "Was war der beste Ratschlag, den du je bekommen hast?",

        // Beziehungen & Menschen
        "Wie zeigst du Menschen, dass sie dir wichtig sind?",
        "Welche Eigenschaft schätzt du am meisten an deinen Freunden?",
        "Was ist das Schönste, das jemand jemals für dich getan hat?",
        "Wie definierst du echte Freundschaft?",
        "Welche Person hat dein Leben am meisten beeinflusst?",
        "Was macht für dich ein gutes Gespräch aus?",
        "Wie gehst du mit Konflikten um?",
        "Was hast du von deinem besten Freund oder deiner besten Freundin gelernt?",
        "Welche kleine Geste bedeutet dir besonders viel?",
        "Woran erkennst du, dass du jemandem vertrauen kannst?",

        // Träume & Zukunft
        "Wenn du in 10 Jahren auf heute zurückschaust, was wäre das Wichtigste, das du erreicht hättest?",
        "Welchen Traum hast du aufgegeben, den du eigentlich noch verwirklichen möchtest?",
        "Was würdest du tun, wenn du noch einmal 20 wärst?",
        "Wo siehst du dich in 5 Jahren, wenn alles nach Plan läuft?",
        "Welches Abenteuer steht noch auf deiner Liste?",
        "Was möchtest du unbedingt noch lernen?",
        "Wenn du einen anderen Beruf hättest, welcher wäre es?",
        "Was würdest du mit einem Jahr Auszeit machen?",
        "Welches Land oder welche Stadt möchtest du unbedingt noch besuchen?",
        "Was ist dein größter Traum, den du niemandem erzählst?",

        // Alltag & Gewohnheiten
        "Wie sieht dein perfekter Morgen aus?",
        "Welches Ritual hilft dir durch stressige Zeiten?",
        "Was ist dein guilty pleasure, für das du dich nicht schämst?",
        "Wie tankst du Energie auf, wenn du erschöpft bist?",
        "Was ist dein Lieblingsort, um nachzudenken?",
        "Welche Gewohnheit hat dein Leben verbessert?",
        "Was machst du, wenn du nicht schlafen kannst?",
        "Wie belohnst du dich nach einer schwierigen Aufgabe?",
        "Was ist dein Geheimrezept für gute Laune?",
        "Welcher kleine Luxus ist für dich unverzichtbar?",

        // Kreativität & Interessen
        "Welches Buch hat dein Denken verändert?",
        "Welcher Song bringt dich sofort in eine bestimmte Stimmung?",
        "Wenn du ein Instrument perfekt spielen könntest, welches wäre es?",
        "Welcher Film hat dich zuletzt emotional berührt?",
        "Worüber könntest du stundenlang reden?",
        "Welches Hobby hast du aufgegeben, das du wieder anfangen möchtest?",
        "Was würdest du gerne erschaffen, wenn du keine Angst vor dem Scheitern hättest?",
        "Welche Serie könntest du immer wieder schauen?",
        "Was inspiriert dich kreativ?",
        "Welches Kunstwerk oder welche Musik hat dich tief berührt?",

        // Herausforderungen & Wachstum
        "Was war die schwierigste Entscheidung, die du je treffen musstest?",
        "Welchen Fehler würdest du nicht noch einmal machen?",
        "Was hast du durch eine Niederlage gelernt?",
        "Wie gehst du mit Kritik um?",
        "Welche Angst hast du überwunden?",
        "Was war dein größter Aha-Moment?",
        "Welche Herausforderung hat dich am meisten wachsen lassen?",
        "Wie findest du Motivation in schwierigen Zeiten?",
        "Was würdest du deinem jüngeren Ich raten?",
        "Welchen Rat ignorierst du immer wieder, obwohl du weißt, dass er stimmt?",

        // Spaß & Leichtigkeit
        "Wenn du ein Tier wärst, welches wärst du?",
        "Was war das Verrückteste, das du je gemacht hast?",
        "Welche Superkraft hättest du gerne für einen Tag?",
        "Was bringt dich garantiert zum Lachen?",
        "Welches Essen könntest du jeden Tag essen?",
        "Was ist dein peinlichster Moment, über den du heute lachen kannst?",
        "Wenn du eine Zeitmaschine hättest, welche Epoche würdest du besuchen?",
        "Welchen Promi würdest du gerne zum Abendessen einladen?",
        "Was würdest du mit einer Million Euro machen?",
        "Wenn du eine Sache an der Welt ändern könntest, was wäre es?",

        // Erinnerungen & Vergangenheit
        "Welcher Moment in deinem Leben war perfekt?",
        "Was ist deine schönste Kindheitserinnerung?",
        "Welcher Geruch versetzt dich sofort in die Vergangenheit?",
        "Was vermisst du am meisten aus deiner Kindheit?",
        "Welchen Tag würdest du gerne nochmal erleben?",
        "Was war das beste Geschenk, das du je bekommen hast?",
        "Welche Erinnerung bringt dich immer zum Lächeln?",
        "Was hast du als Kind geglaubt, das sich als falsch herausgestellt hat?",
        "Welches Erlebnis hat dich geprägt?",
        "Was würdest du in einer Zeitkapsel für die Zukunft hinterlassen?",

        // Arbeit & Erfolg
        "Wann fühlst du dich bei der Arbeit am erfülltesten?",
        "Was würdest du tun, wenn du nicht arbeiten müsstest?",
        "Welche Fähigkeit hat dir beruflich am meisten geholfen?",
        "Was bedeutet Erfolg für dich?",
        "Worauf bist du beruflich am meisten stolz?",
        "Wie trennst du Arbeit und Privatleben?",
        "Was motiviert dich, jeden Tag aufzustehen?",
        "Welchen Job hättest du nie machen wollen?",
        "Was hast du von deinem besten Chef gelernt?",
        "Wie gehst du mit Stress um?",

        // Tiefere Gespräche
        "Was bedeutet Glück für dich?",
        "Wovor hast du am meisten Angst?",
        "Was gibt deinem Leben Sinn?",
        "Wann hast du dich zuletzt richtig lebendig gefühlt?",
        "Was würdest du ändern, wenn du nochmal von vorne anfangen könntest?",
        "Welche Frage stellst du dir selbst am häufigsten?",
        "Was hält dich nachts manchmal wach?",
        "Wann fühlst du dich am verletzlichsten?",
        "Was ist das Wichtigste im Leben?",
        "Welche Frage wolltest du schon immer jemandem stellen?",

        // Spontan & Kreativ
        "Beschreibe deinen perfekten Tag in drei Worten.",
        "Wenn dein Leben ein Film wäre, welches Genre wäre es?",
        "Welche Farbe beschreibt deine aktuelle Stimmung?",
        "Wenn du eine historische Figur treffen könntest, wen würdest du wählen?",
        "Was steht auf deiner Löffelliste ganz oben?",
        "Welchen Trend verstehst du nicht?",
        "Was ist das Ungewöhnlichste, das du besitzt?",
        "Welche Sprache würdest du gerne sprechen?",
        "Wenn du einen Tag unsichtbar wärst, was würdest du tun?",
        "Was ist das Interessanteste, das du in letzter Zeit gelernt hast?",
      ];

      let currentIndex = 0;
      let shuffledQuestions = [];
      const questionEl = document.getElementById("question");
      const currentEl = document.getElementById("current");
      const totalEl = document.getElementById("total");

      function shuffle(array) {
        const arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }

      function displayQuestion() {
        questionEl.classList.remove("visible");

        setTimeout(() => {
          questionEl.textContent = shuffledQuestions[currentIndex];
          currentEl.textContent = currentIndex + 1;
          questionEl.classList.add("visible");
        }, 200);
      }

      function nextQuestion() {
        currentIndex = (currentIndex + 1) % shuffledQuestions.length;
        displayQuestion();
      }

      function init() {
        shuffledQuestions = shuffle(questions);
        totalEl.textContent = questions.length;
        displayQuestion();
      }

      document.addEventListener("keydown", (e) => {
        if (e.code === "Space" || e.code === "Enter" || e.code === "ArrowRight") {
          e.preventDefault();
          nextQuestion();
        }
      });

      init();
    </script>
  </body>
</html>

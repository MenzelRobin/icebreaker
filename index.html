<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Icebreaker – lucoyo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* lucoyo Corporate Design Colors */
      :root {
        /* Primary Colors */
        --petrol: #32768D;
        --seegruen: #338485;
        --emerald: #40937A;

        /* Secondary Colors */
        --mandel: #F1EBE4;
        --hellgrau: #EEEEEE;
        --kastanienbraun: #503D3F;
        --schwarz: #141414;
        --weiss: #FFFFFF;
        --dunkelgrau: #404040;

        /* Accent */
        --opal: #DC5E40;

        /* Light Theme (default) */
        --bg-primary: var(--mandel);
        --bg-secondary: var(--hellgrau);
        --bg-card: var(--weiss);
        --text-primary: var(--schwarz);
        --text-secondary: var(--dunkelgrau);
        --text-muted: #888;
        --accent: var(--emerald);
        --accent-secondary: var(--opal);
        --border: rgba(0, 0, 0, 0.08);
        --border-hover: rgba(0, 0, 0, 0.15);
        --success: var(--emerald);
        --gradient: linear-gradient(45deg, var(--petrol), var(--emerald));
      }

      [data-theme="dark"] {
        --bg-primary: var(--schwarz);
        --bg-secondary: #1a1a1a;
        --bg-card: #1e1e1e;
        --text-primary: var(--weiss);
        --text-secondary: var(--hellgrau);
        --text-muted: #888;
        --border: rgba(255, 255, 255, 0.08);
        --border-hover: rgba(255, 255, 255, 0.15);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        font-size: 16px;
      }

      body {
        font-family: "Nunito", -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        position: relative;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        transition: background 0.3s ease, color 0.3s ease;
      }

      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background:
          radial-gradient(ellipse 80% 50% at 50% -20%, rgba(64, 147, 122, 0.12), transparent),
          radial-gradient(ellipse 60% 40% at 100% 100%, rgba(50, 118, 141, 0.08), transparent);
        pointer-events: none;
        transition: opacity 0.3s ease;
      }

      [data-theme="dark"] body::before {
        background:
          radial-gradient(ellipse 80% 50% at 50% -20%, rgba(64, 147, 122, 0.15), transparent),
          radial-gradient(ellipse 60% 40% at 100% 100%, rgba(50, 118, 141, 0.1), transparent);
      }

      .app {
        width: 100%;
        max-width: 640px;
        display: flex;
        flex-direction: column;
        gap: 24px;
        position: relative;
        z-index: 1;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo-container {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .logo {
        height: 40px;
        width: auto;
      }

      .header-title {
        display: flex;
        flex-direction: column;
      }

      .subtitle {
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--emerald);
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        line-height: 1.2;
        color: var(--text-primary);
      }

      .theme-toggle {
        background: var(--bg-secondary);
        border: 1px solid var(--border);
        border-radius: 100px;
        padding: 10px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s ease;
        color: var(--text-secondary);
      }

      .theme-toggle:hover {
        border-color: var(--border-hover);
        color: var(--text-primary);
      }

      .theme-toggle svg {
        width: 18px;
        height: 18px;
      }

      .theme-toggle .icon-moon {
        display: none;
      }

      [data-theme="dark"] .theme-toggle .icon-sun {
        display: none;
      }

      [data-theme="dark"] .theme-toggle .icon-moon {
        display: block;
      }

      .filters {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
      }

      .filter-btn {
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 100px;
        padding: 8px 16px;
        font-family: inherit;
        font-size: 0.8125rem;
        font-weight: 600;
        color: var(--text-muted);
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .filter-btn:hover {
        border-color: var(--border-hover);
        color: var(--text-secondary);
      }

      .filter-btn.active {
        background: var(--gradient);
        border-color: transparent;
        color: white;
      }

      .card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 40px;
        position: relative;
        overflow: hidden;
        transition: border-color 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
      }

      .card:hover {
        border-color: var(--border-hover);
        box-shadow: 0 8px 40px -12px rgba(64, 147, 122, 0.2);
      }

      .card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: var(--gradient);
      }

      .question-wrapper {
        min-height: 120px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 24px;
      }

      .question {
        font-size: 1.375rem;
        font-weight: 500;
        line-height: 1.6;
        text-align: center;
        color: var(--text-primary);
        opacity: 0;
        transform: translateY(12px);
        transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1),
          transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .question.visible {
        opacity: 1;
        transform: translateY(0);
      }

      .actions {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }

      .primary-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        background: var(--gradient);
        color: white;
        border: none;
        border-radius: 100px;
        padding: 14px 28px;
        font-family: inherit;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s ease;
        position: relative;
        overflow: hidden;
      }

      .primary-btn::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(to bottom, rgba(255, 255, 255, 0.15), transparent);
        opacity: 0;
        transition: opacity 0.2s ease;
      }

      .primary-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px -8px rgba(64, 147, 122, 0.5);
      }

      .primary-btn:hover::before {
        opacity: 1;
      }

      .primary-btn:active {
        transform: translateY(0) scale(0.98);
      }

      .primary-btn svg {
        width: 18px;
        height: 18px;
        transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .primary-btn:hover svg {
        transform: rotate(180deg);
      }

      .secondary-actions {
        display: flex;
        gap: 4px;
      }

      .secondary-btn {
        background: transparent;
        border: none;
        padding: 10px 16px;
        font-family: inherit;
        font-size: 0.8125rem;
        font-weight: 600;
        color: var(--text-muted);
        cursor: pointer;
        transition: all 0.2s ease;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border-radius: 8px;
      }

      .secondary-btn:hover {
        color: var(--emerald);
        background: var(--bg-secondary);
      }

      .secondary-btn svg {
        width: 16px;
        height: 16px;
      }

      .secondary-btn.copied {
        color: var(--success);
      }

      .toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px 20px;
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--text-primary);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
        opacity: 0;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        z-index: 100;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .toast.visible {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }

      .toast svg {
        width: 18px;
        height: 18px;
        color: var(--success);
      }

      footer {
        text-align: center;
      }

      .counter {
        font-size: 0.875rem;
        color: var(--text-secondary);
        font-variant-numeric: tabular-nums;
        margin-bottom: 8px;
      }

      .keyboard-hint {
        display: flex;
        justify-content: center;
        gap: 6px;
        color: var(--text-muted);
        font-size: 0.8125rem;
      }

      kbd {
        background: var(--bg-secondary);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 4px 10px;
        font-family: inherit;
        font-size: 0.75rem;
        font-weight: 600;
      }

      #imageCanvas {
        display: none;
      }

      @media (max-width: 640px) {
        body {
          padding: 20px;
        }

        .logo {
          height: 32px;
        }

        h1 {
          font-size: 1.25rem;
        }

        .subtitle {
          font-size: 0.6875rem;
        }

        .card {
          padding: 32px 24px;
          border-radius: 16px;
        }

        .question-wrapper {
          min-height: 100px;
        }

        .question {
          font-size: 1.1875rem;
        }

        .primary-btn {
          padding: 14px 24px;
          font-size: 0.9375rem;
        }

        .keyboard-hint {
          display: none;
        }

        .filters {
          gap: 6px;
        }

        .filter-btn {
          padding: 6px 12px;
          font-size: 0.75rem;
        }
      }

      @media (max-width: 380px) {
        .header-title {
          display: none;
        }

        .card {
          padding: 24px 20px;
        }

        .question {
          font-size: 1.0625rem;
        }

        .secondary-actions {
          flex-direction: column;
          width: 100%;
        }

        .secondary-btn {
          justify-content: center;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          transition-duration: 0.01ms !important;
          animation-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <div class="logo-container">
          <img
            src="https://lucoyo.de/wp-content/webp-express/webp-images/uploads/2022/12/Lucoyo_WortBildmarke_Primaer_Bunt_MitHintergrund.png.webp"
            alt="lucoyo"
            class="logo"
          />
          <div class="header-title">
            <span class="subtitle">Team Meeting</span>
            <h1>Icebreaker</h1>
          </div>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="Theme wechseln">
          <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </header>

      <div class="filters">
        <button class="filter-btn active" data-category="all">Alle</button>
        <button class="filter-btn" data-category="leicht">Leicht</button>
        <button class="filter-btn" data-category="tiefgruendig">Tiefgründig</button>
        <button class="filter-btn" data-category="team">Team</button>
      </div>

      <main class="card">
        <div class="question-wrapper">
          <p class="question" id="question"></p>
        </div>
        <div class="actions">
          <button class="primary-btn" onclick="nextQuestion()">
            <span>Nächste Frage</span>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/>
              <path d="M21 3v5h-5"/>
            </svg>
          </button>
          <div class="secondary-actions">
            <button class="secondary-btn" onclick="copyQuestion()" id="copyBtn">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
              </svg>
              <span>Kopieren</span>
            </button>
            <button class="secondary-btn" onclick="downloadImage()">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
              </svg>
              <span>Als Bild</span>
            </button>
          </div>
        </div>
      </main>

      <footer>
        <p class="counter">
          <span id="current">1</span> von <span id="total">0</span> Fragen
        </p>
        <div class="keyboard-hint">
          <kbd>Leertaste</kbd>
          <span>für nächste Frage</span>
        </div>
      </footer>
    </div>

    <div class="toast" id="toast">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      <span id="toastMessage">Kopiert!</span>
    </div>

    <canvas id="imageCanvas" width="1200" height="630"></canvas>

    <script>

          "Welches Buch hat dein Denken verändert?",
          "Worüber könntest du stundenlang reden?",
          "Welches Hobby hast du aufgegeben, das du wieder anfangen möchtest?",
          "Was würdest du gerne erschaffen, wenn du keine Angst vor dem Scheitern hättest?",
          "Was inspiriert dich kreativ?",
          "Welches Ritual hilft dir durch stressige Zeiten?",
          "Wie tankst du Energie auf, wenn du erschöpft bist?",
          "Welche Gewohnheit hat dein Leben verbessert?",
          "Wie belohnst du dich nach einer schwierigen Aufgabe?",
          "Welcher kleine Luxus ist für dich unverzichtbar?",
          "Was steht auf deiner Löffelliste ganz oben?",
        ],
      };

      let currentCategory = "all";
      let currentIndex = 0;
      let filteredQuestions = [];
      const questionEl = document.getElementById("question");
      const currentEl = document.getElementById("current");
      const totalEl = document.getElementById("total");
      const toast = document.getElementById("toast");
      const toastMessage = document.getElementById("toastMessage");
      const copyBtn = document.getElementById("copyBtn");

      function getAllQuestions() {
        return [
          ...questions.leicht,
          ...questions.tiefgruendig,
          ...questions.team,
        ];
      }

      function shuffle(array) {
        const arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }

      function filterQuestions(category) {
        currentCategory = category;
        if (category === "all") {
          filteredQuestions = shuffle(getAllQuestions());
        } else {
          filteredQuestions = shuffle([...questions[category]]);
        }
        currentIndex = 0;
        totalEl.textContent = filteredQuestions.length;
        displayQuestion();

        document.querySelectorAll(".filter-btn").forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.category === category);
        });
      }

      function displayQuestion() {
        questionEl.classList.remove("visible");

        setTimeout(() => {
          questionEl.textContent = filteredQuestions[currentIndex];
          currentEl.textContent = currentIndex + 1;
          questionEl.classList.add("visible");
        }, 200);
      }

      function nextQuestion() {
        currentIndex = (currentIndex + 1) % filteredQuestions.length;
        displayQuestion();
      }

      function showToast(message) {
        toastMessage.textContent = message;
        toast.classList.add("visible");
        setTimeout(() => {
          toast.classList.remove("visible");
        }, 2000);
      }

      function copyQuestion() {
        const text = filteredQuestions[currentIndex];
        navigator.clipboard.writeText(text).then(() => {
          copyBtn.classList.add("copied");
          showToast("Kopiert!");
          setTimeout(() => {
            copyBtn.classList.remove("copied");
          }, 2000);
        });
      }

      function downloadImage() {
        const canvas = document.getElementById("imageCanvas");
        const ctx = canvas.getContext("2d");
        const text = filteredQuestions[currentIndex];
        const isDark = document.documentElement.getAttribute("data-theme") === "dark";

        // lucoyo gradient background (45° from Petrol to Emerald)
        const gradient = ctx.createLinearGradient(0, canvas.height, canvas.width, 0);
        gradient.addColorStop(0, "#32768D"); // Petrol
        gradient.addColorStop(1, "#40937A"); // Emerald

        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Subtle overlay pattern
        ctx.fillStyle = "rgba(255, 255, 255, 0.05)";
        for (let i = 0; i < 30; i++) {
          const x = Math.random() * canvas.width;
          const y = Math.random() * canvas.height;
          const radius = Math.random() * 80 + 40;
          ctx.beginPath();
          ctx.arc(x, y, radius, 0, Math.PI * 2);
          ctx.fill();
        }

        // Border frame
        ctx.strokeStyle = "rgba(255, 255, 255, 0.2)";
        ctx.lineWidth = 2;
        ctx.strokeRect(40, 40, canvas.width - 80, canvas.height - 80);

        // lucoyo branding
        ctx.fillStyle = "rgba(255, 255, 255, 0.7)";
        ctx.font = "600 14px Nunito, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("LUCOYO ICEBREAKER", canvas.width / 2, 85);

        // Question text
        ctx.fillStyle = "#FFFFFF";
        ctx.font = "600 40px Nunito, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        const maxWidth = canvas.width - 160;
        const words = text.split(" ");
        let lines = [];
        let currentLine = "";

        words.forEach((word) => {
          const testLine = currentLine + (currentLine ? " " : "") + word;
          const metrics = ctx.measureText(testLine);
          if (metrics.width > maxWidth && currentLine) {
            lines.push(currentLine);
            currentLine = word;
          } else {
            currentLine = testLine;
          }
        });
        lines.push(currentLine);

        const lineHeight = 54;
        const totalHeight = lines.length * lineHeight;
        const startY = (canvas.height - totalHeight) / 2 + 20;

        lines.forEach((line, index) => {
          ctx.fillText(line, canvas.width / 2, startY + index * lineHeight);
        });

        // Download
        const link = document.createElement("a");
        link.download = "lucoyo-icebreaker.png";
        link.href = canvas.toDataURL("image/png");
        link.click();

        showToast("Bild heruntergeladen!");
      }

      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "dark" ? "light" : "dark";

        html.setAttribute("data-theme", newTheme);
        localStorage.setItem("lucoyo-icebreaker-theme", newTheme);
      }

      function initTheme() {
        const savedTheme = localStorage.getItem("lucoyo-icebreaker-theme");
        if (savedTheme) {
          document.documentElement.setAttribute("data-theme", savedTheme);
        }
        // Default is light theme (matches lucoyo CD - light backgrounds)
      }

      function init() {
        initTheme();
        filterQuestions("all");

        document.querySelectorAll(".filter-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            filterQuestions(btn.dataset.category);
          });
        });
      }

      document.addEventListener("keydown", (e) => {
        if (e.code === "Space" || e.code === "Enter" || e.code === "ArrowRight") {
          e.preventDefault();
          nextQuestion();
        }
      });

      init();
    </script>
  </body>
</html>
